name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  test-chromium:
    name: Test — Chromium
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests — Chromium
        id: run_tests
        run: npx playwright test --project=chromium
        continue-on-error: true
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-playwright-report-chromium
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: steps.run_tests.outcome == 'failure'
        with:
          name: pr-test-results-chromium
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

    outputs:
      status: ${{ steps.run_tests.outcome }}

  test-iphone15:
    name: Test — iPhone 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit

      - name: Run tests — iPhone 15
        id: run_tests
        run: npx playwright test --project="iPhone 15"
        continue-on-error: true
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-playwright-report-iphone-15
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: steps.run_tests.outcome == 'failure'
        with:
          name: pr-test-results-iphone-15
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

    outputs:
      status: ${{ steps.run_tests.outcome }}

  pr-summary:
    name: PR Test Summary
    needs: [test-chromium, test-iphone15]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const chromiumStatus = '${{ needs.test-chromium.outputs.status }}';
            const iphone15Status = '${{ needs.test-iphone15.outputs.status }}';

            const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';
            const label = (s) => s === 'success' ? 'Passed' : s === 'failure' ? 'Failed' : s || 'Unknown';

            const allPassed = chromiumStatus === 'success' && iphone15Status === 'success';
            const header = allPassed ? '✅ All PR checks passed' : '❌ Some PR checks failed';

            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = [
              `## ${header}`,
              '',
              '| Project | Result |',
              '|---|---|',
              `| 🖥️ Chromium | ${icon(chromiumStatus)} ${label(chromiumStatus)} |`,
              `| 📱 iPhone 15 | ${icon(iphone15Status)} ${label(iphone15Status)} |`,
              '',
              `> Full test results and artifacts are available in the [Actions run](${runUrl}).`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('PR checks')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
