name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test — ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            artifact: chromium
            browser: chromium
          - project: firefox
            artifact: firefox
            browser: firefox
          - project: webkit
            artifact: webkit
            browser: webkit
          - project: iPhone 15
            artifact: iphone-15
            browser: webkit
          - project: iPhone 15 Pro
            artifact: iphone-15-pro
            browser: webkit
          - project: Pixel 7
            artifact: pixel-7
            browser: chromium
          - project: Galaxy S8
            artifact: galaxy-s8
            browser: chromium

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests — ${{ matrix.project }}
        run: npx playwright test --project="${{ matrix.project }}"
        env:
          CI: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.artifact }}
          path: allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.artifact }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload screenshots, videos, and traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.artifact }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  allure-report:
    name: Generate Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Generate Allure report
        run: npm run allure:generate

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload merged Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
          if-no-files-found: warn
